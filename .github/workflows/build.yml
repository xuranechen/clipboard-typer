name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyperclip pyautogui pynput pystray Pillow ttkbootstrap pyinstaller

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            RELEASE_TAG="${{ github.ref_name }}"
            RELEASE_NAME="v${VERSION}"
            PRERELEASE="false"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION="0.6.0-dev-$(date +%Y%m%d)-${SHORT_SHA}"
            RELEASE_TAG="nightly"
            RELEASE_NAME="Nightly Build"
            PRERELEASE="true"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"
          echo "Release tag: ${RELEASE_TAG}"

      - name: Run compile check
        run: python -m compileall app main.py

      - name: Build exe
        shell: pwsh
        env:
          CLIPBOARD_TYPER_VERSION: ${{ steps.version.outputs.version }}
          CLIPBOARD_TYPER_COMMIT_SHA: ${{ github.sha }}
        run: |
          pyinstaller -F -w -n ClipboardTyper --version-file build\version.txt main.py

      - name: Rename exe with version
        shell: pwsh
        run: |
          Copy-Item dist\ClipboardTyper.exe dist\ClipboardTyper-${{ steps.version.outputs.version }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardTyper-${{ steps.version.outputs.version }}
          path: |
            dist/ClipboardTyper.exe
            dist/ClipboardTyper-${{ steps.version.outputs.version }}.exe
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/ClipboardTyper.exe
            dist/ClipboardTyper-${{ steps.version.outputs.version }}.exe
          prerelease: ${{ steps.version.outputs.prerelease }}
          make_latest: ${{ startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
          body: |
            ## Clipboard Typer ${{ steps.version.outputs.release_name }}

            ### 下载
            - `ClipboardTyper.exe` — 固定文件名，适合直接下载覆盖
            - `ClipboardTyper-${{ steps.version.outputs.version }}.exe` — 带版本号的构建产物

            ### 构建信息
            - 版本：`${{ steps.version.outputs.version }}`
            - 提交：`${{ github.sha }}`
            - 来源：`${{ github.ref }}`
