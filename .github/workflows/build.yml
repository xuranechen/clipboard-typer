name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyperclip pyautogui pynput pystray Pillow ttkbootstrap pyinstaller

      - name: Update version
        shell: bash
        run: |
          BASE="0.6"
          PATCH=${{ github.run_number }}
          VERSION="${BASE}.${PATCH}"
          echo "version=${VERSION}" >> $GITHUB_ENV
          echo "Resolved version: ${VERSION}"

      - name: Inject version into source
        shell: bash
        run: |
          sed -i "s/0.6.0-dev/${{ env.version }}/" app/version.py

      - name: Run compile check
        run: python -m compileall app main.py

      - name: Build exe
        shell: pwsh
        env:
          CLIPBOARD_TYPER_VERSION: ${{ env.version }}
          CLIPBOARD_TYPER_COMMIT_SHA: ${{ github.sha }}
        run: |
          pyinstaller -F -w -n ClipboardTyper --version-file build\version.txt --collect-data ttkbootstrap main.py

      - name: Changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" -20)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Tag
        run: |
          git tag v${{ env.version }}
          git push origin v${{ env.version }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.version }}
          name: v${{ env.version }}
          body: |
            ## Clipboard Typer v${{ env.version }}

            ### 变更内容
            ${{ steps.changelog.outputs.log }}

            ### 下载
            - `ClipboardTyper.exe` — Windows 可执行文件

            ### 构建信息
            - 版本：`${{ env.version }}`
            - 提交：`${{ github.sha }}`
          files: dist/ClipboardTyper.exe
