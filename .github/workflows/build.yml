name: Build Clipboard Typer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyperclip pyautogui pynput pystray Pillow ttkbootstrap pyinstaller

      - name: Run compile check
        run: python -m compileall app main.py

      - name: Build exe
        run: |
          pyinstaller -F -w -n ClipboardTyper --version-file build\version.txt main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardTyper
          path: dist/ClipboardTyper.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyperclip pyautogui pynput pystray Pillow ttkbootstrap pyinstaller

      - name: Build exe
        run: |
          pyinstaller -F -w -n ClipboardTyper --version-file build\version.txt main.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ClipboardTyper.exe
          generate_release_notes: true
